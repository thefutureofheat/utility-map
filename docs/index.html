<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>EIA / PHMSA Natural Gas Utility Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css"/>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; font-size: 13px; color: #222; }

    #sidebar {
      position: absolute; top: 0; left: 0; width: 300px; height: 100%;
      background: #fff; overflow-y: auto; z-index: 1000;
      box-shadow: 2px 0 8px rgba(0,0,0,0.18);
      display: flex; flex-direction: column;
    }
    #map { position: absolute; top: 0; left: 300px; right: 0; bottom: 0; }

    #loading {
      position: absolute; top: 50%; left: calc(150px + 50%);
      transform: translate(-50%, -50%);
      background: rgba(255,255,255,0.96); padding: 22px 32px;
      border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.22);
      font-size: 15px; font-weight: 500; z-index: 2000; text-align: center;
    }
    #loading small { display: block; font-size: 11px; color: #888; margin-top: 4px; }

    /* ── Sidebar sections ────────────────────────────────── */
    .sidebar-header {
      padding: 14px 16px 10px; background: #1a3a5c; color: white; flex-shrink: 0;
    }
    .sidebar-header h2 { margin: 0 0 3px; font-size: 15px; letter-spacing: 0.2px; }
    .sidebar-header p  { margin: 0; font-size: 10px; opacity: 0.75; }

    .color-section { padding: 10px 16px; border-bottom: 1px solid #eee; flex-shrink: 0; }
    .color-section label {
      display: block; font-weight: 700; font-size: 10px;
      text-transform: uppercase; letter-spacing: 0.6px; color: #666; margin-bottom: 5px;
    }
    .color-section select {
      width: 100%; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px;
      font-size: 12px; background: white; cursor: pointer;
    }

    /* ── Year slider ──────────────────────────────────────── */
    .year-section { padding: 9px 16px 10px; border-bottom: 1px solid #eee; flex-shrink: 0; }
    .year-header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
    .year-header label {
      font-weight: 700; font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.6px; color: #666;
    }
    #yearDisplay { font-size: 15px; font-weight: 700; color: #1a3a5c; }
    #yearSlider {
      width: 100%; margin: 2px 0 3px; accent-color: #1a3a5c;
      cursor: pointer;
    }
    #yearSlider:disabled { opacity: 0.4; cursor: not-allowed; }
    .year-ticks { display: flex; justify-content: space-between; font-size: 9px; color: #bbb; margin-bottom: 4px; }
    .year-avail { font-size: 10px; color: #888; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .avail-item { display: flex; align-items: center; gap: 4px; }
    .avail-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .avail-dot.yes { background: #43A047; }
    .avail-dot.no  { background: #ccc; }

    /* ── Legend ───────────────────────────────────────────── */
    #legend { padding: 8px 16px 10px; border-bottom: 1px solid #eee; flex-shrink: 0; }
    .legend-title { font-size: 10px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 5px; }
    .legend-gradient { height: 10px; border-radius: 5px; margin-bottom: 3px; }
    .legend-labels { display: flex; justify-content: space-between; font-size: 10px; color: #777; }
    .legend-na { display: flex; align-items: center; gap: 5px; margin-top: 5px; font-size: 10px; color: #888; }
    .legend-na-swatch { width: 12px; height: 12px; border-radius: 2px; background: #e0e0e0; border: 1px solid #bbb; flex-shrink: 0; }

    /* ── Info panel ───────────────────────────────────────── */
    #info-panel { flex: 1; padding: 12px 16px; overflow-y: auto; min-height: 0; }
    .info-hint { color: #aaa; font-size: 11px; font-style: italic; margin: 0; line-height: 1.5; }

    .info-name { font-size: 13px; font-weight: 700; margin: 0 0 3px; line-height: 1.3; }
    .info-sub  { font-size: 11px; color: #666; margin: 0 0 7px; }
    .info-badges { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 9px; }
    .badge {
      font-size: 9px; padding: 2px 6px; border-radius: 9px;
      font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px;
    }
    .badge-full    { background: #e3f2fd; color: #1565c0; }
    .badge-phmsa   { background: #f3e5f5; color: #6a1b9a; }
    .badge-geo     { background: #e8f5e9; color: #2e7d32; }
    .badge-nomatch { background: #f5f5f5; color: #757575; }

    /* ── Info sections ────────────────────────────────────── */
    .info-section { margin-bottom: 11px; }
    .info-section-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.6px; color: #1a3a5c;
      border-bottom: 2px solid #1a3a5c; padding-bottom: 3px; margin-bottom: 7px;
    }

    .stat-row { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 3px; }
    .stat-label { color: #666; font-size: 11px; flex: 1; }
    .stat-val   { font-weight: 600; font-size: 11px; text-align: right; }

    /* ── Decade histogram ─────────────────────────────────── */
    .decade-row { display: flex; align-items: center; margin-bottom: 3px; gap: 4px; }
    .decade-lbl { width: 55px; font-size: 10px; color: #555; flex-shrink: 0; }
    .bar-wrap   { flex: 1; background: #f0f0f0; border-radius: 2px; height: 9px; overflow: hidden; }
    .bar-inner  { height: 9px; border-radius: 2px; transition: width 0.2s; }
    .bar-val    { width: 46px; font-size: 10px; color: #666; text-align: right; flex-shrink: 0; }

    /* ── Material bar chart ───────────────────────────────── */
    .mat-row { display: flex; align-items: center; margin-bottom: 3px; gap: 4px; }
    .mat-swatch { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }
    .mat-lbl { flex: 1; font-size: 10px; color: #555; }
    .mat-bar-wrap { width: 60px; background: #f0f0f0; border-radius: 2px; height: 7px; overflow: hidden; flex-shrink: 0; }
    .mat-bar-inner { height: 7px; border-radius: 2px; }
    .mat-val { width: 42px; font-size: 10px; color: #666; text-align: right; flex-shrink: 0; }

    /* ── Subsection headers ──────────────────────────────── */
    .subsec-hdr {
      font-size: 9.5px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.5px; color: #555;
      border-bottom: 1px solid #ddd; padding-bottom: 2px;
      margin-top: 9px; margin-bottom: 5px;
    }

    /* ── Sales table ─────────────────────────────────────── */
    .sales-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .sales-table th {
      font-size: 9px; text-transform: uppercase; color: #999; font-weight: 700;
      padding: 2px 4px; text-align: right; border-bottom: 1px solid #e0e0e0;
    }
    .sales-table th:first-child { text-align: left; }
    .sales-table td { padding: 3px 4px; border-bottom: 1px solid #f5f5f5; text-align: right; }
    .sales-table td:first-child { text-align: left; font-weight: 500; }
    .sales-table tr.total-row td { font-weight: 700; background: #f8f8f8; border-top: 1px solid #e0e0e0; border-bottom: none; }

    .pinned-note { font-size: 10px; color: #aaa; font-style: italic; margin-top: 8px; }

    /* ── Incidents panel ─────────────────────────────────── */
    #incidents-panel {
      position: absolute; top: 0; left: 300px; right: 0; bottom: 0;
      background: #fff; z-index: 1100;
      display: none; flex-direction: column;
      box-shadow: 2px 0 12px rgba(0,0,0,0.22);
    }
    #incidents-panel.open { display: flex; }
    .incidents-header {
      padding: 12px 16px 10px;
      background: #5c1a1a; color: white;
      display: flex; justify-content: space-between; align-items: flex-start;
      flex-shrink: 0;
    }
    .incidents-header-title { font-size: 13px; font-weight: 700; line-height: 1.3; }
    .incidents-header-sub { font-size: 10px; opacity: 0.75; margin-top: 2px; }
    .incidents-close {
      background: none; border: none; color: rgba(255,255,255,0.7);
      font-size: 18px; cursor: pointer; padding: 0 2px; line-height: 1;
      flex-shrink: 0; margin-left: 8px;
    }
    .incidents-close:hover { color: white; }
    #incidents-body { flex: 1; overflow-y: auto; padding: 12px 16px; }
    .incidents-table {
      width: 100%; border-collapse: collapse; font-size: 11px;
      table-layout: fixed;
    }
    .incidents-table th {
      font-size: 9px; text-transform: uppercase; color: #999; font-weight: 700;
      padding: 4px 6px; text-align: left; border-bottom: 2px solid #e0e0e0;
      background: #fafafa; position: sticky; top: 0; z-index: 1;
      cursor: pointer; user-select: none; white-space: nowrap;
    }
    .incidents-table th:hover { color: #5c1a1a; }
    .incidents-table th.sorted-asc::after  { content: " ▲"; font-size: 8px; }
    .incidents-table th.sorted-desc::after { content: " ▼"; font-size: 8px; }
    .incidents-table td {
      padding: 4px 6px; border-bottom: 1px solid #f0f0f0;
      vertical-align: top; word-break: break-word;
    }
    .incidents-table tr:hover td { background: #fdf5f5; }
    .col-year     { width: 52px; }
    .col-fatal    { width: 52px; text-align: center; }
    .col-injure   { width: 52px; text-align: center; }
    .col-cause    { width: 130px; }
    .col-narrative { }
    .incidents-table td.col-fatal,
    .incidents-table td.col-injure { text-align: center; }
    .fatal-nonzero { color: #c62828; font-weight: 700; }
    .injure-nonzero { color: #e65100; font-weight: 700; }
    .incidents-btn {
      display: block; width: 100%; margin-top: 6px; padding: 7px 12px;
      background: #5c1a1a; color: white; border: none; border-radius: 5px;
      font-size: 12px; font-weight: 600; cursor: pointer; text-align: center;
    }
    .incidents-btn:hover { background: #3e1010; }
    .incidents-empty { color: #aaa; font-size: 12px; font-style: italic; padding: 12px 0; }

    /* ── Trends panel ──────────────────────────────────── */
    #trends-panel {
      position: absolute; top: 0; right: -570px; width: 570px; height: 100%;
      background: #fff; z-index: 999;
      box-shadow: -2px 0 8px rgba(0,0,0,0.18);
      display: flex; flex-direction: column;
      transition: right 0.22s ease;
    }
    #trends-panel.open { right: 0; }
    #map { transition: right 0.22s ease; }

    .trends-header {
      padding: 12px 14px 10px;
      background: #1a3a5c; color: white;
      display: flex; justify-content: space-between; align-items: flex-start;
      flex-shrink: 0;
    }
    .trends-header-title { font-size: 13px; font-weight: 700; line-height: 1.3; }
    .trends-header-sub { font-size: 10px; opacity: 0.75; margin-top: 2px; max-width: 290px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .trends-close {
      background: none; border: none; color: rgba(255,255,255,0.7);
      font-size: 18px; cursor: pointer; padding: 0 2px; line-height: 1;
      flex-shrink: 0; margin-left: 8px;
    }
    .trends-close:hover { color: white; }

    #trends-body { flex: 1; overflow-y: auto; padding: 12px 14px; }

    .chart-block { margin-bottom: 20px; }
    .chart-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.6px; color: #1a3a5c;
      border-bottom: 2px solid #1a3a5c; padding-bottom: 3px; margin-bottom: 8px;
    }
    .chart-wrap { position: relative; width: 100%; height: 240px; }

    .trends-btn {
      display: block; width: 100%; margin-top: 10px; padding: 7px 12px;
      background: #1a3a5c; color: white; border: none; border-radius: 5px;
      font-size: 12px; font-weight: 600; cursor: pointer; text-align: center;
    }
    .trends-btn:hover { background: #0f2540; }

    /* ── Data availability chips ──────────────────────────────── */
    .data-avail-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 9px; }
    .src-chip {
      font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 9px;
      letter-spacing: 0.2px; white-space: nowrap;
    }
    .src-eia   { background: #e3f2fd; color: #1565c0; }
    .src-phmsa { background: #f3e5f5; color: #6a1b9a; }

    /* ── Multi-name entries ───────────────────────────────────── */
    .name-group { margin-bottom: 4px; }
    .name-group-label { font-size: 10px; color: #666; margin-bottom: 2px; }
    .name-entry { display: flex; justify-content: space-between; align-items: baseline;
      padding: 1px 0 1px 8px; gap: 6px; }
    .name-entry-name  { font-size: 11px; color: #333; flex: 1; }
    .name-entry-years { font-size: 10px; color: #aaa; white-space: nowrap; flex-shrink: 0; }

    /* ── Multi-state note ─────────────────────────────────────── */
    .multi-state-note {
      display: block; margin-top: 3px; font-size: 11px; font-weight: 700;
      color: #c0392b; letter-spacing: 0.1px;
    }

    /* ── Footer ───────────────────────────────────────────── */
    .sidebar-footer {
      padding: 7px 16px; font-size: 10px; color: #bbb;
      border-top: 1px solid #eee; flex-shrink: 0; text-align: center; line-height: 1.5;
    }
  </style>
</head>
<body>

<div id="sidebar">
  <div class="sidebar-header">
    <h2>Natural Gas Utility Map</h2>
    <p id="headerSub">EIA Form 176 &bull; PHMSA Annual Report</p>
  </div>

  <div class="color-section">
    <label>Color territories by</label>
    <select id="colorMode">
      <optgroup label="Sales &amp; Customers (EIA)">
        <option value="res_vol" selected>Residential Sales Volume (MMcf)</option>
        <option value="res_price">Residential Avg Price ($/Mcf)</option>
        <option value="res_consumption">Residential Consumption (Mcf/customer)</option>
        <option value="res_price_chg_10y">Residential Price: 10-yr Real Change ($/Mcf, 2024$)</option>
        <option value="res_customers">Residential Customers</option>
        <option value="com_price">Commercial Avg Price ($/Mcf)</option>
        <option value="total_sales_vol">Total Sales Volume (MMcf)</option>
        <option value="total_customers">Total Customers (Res + Com)</option>
      </optgroup>
      <optgroup label="Infrastructure (PHMSA)">
        <option value="age">Average Pipe Age</option>
        <option value="miles">Total Pipeline Miles</option>
        <option value="pct_plastic">% Plastic Pipe</option>
        <option value="pct_ci">% Cast Iron Pipe</option>
        <option value="pct_pre1970">% Pre-1970 Pipe</option>
        <option value="leaks">Known Leaks</option>
        <option value="unacc">Unaccounted-for Gas (%)</option>
      </optgroup>
    </select>
  </div>

  <div class="year-section">
    <div class="year-header">
      <label>Year</label>
      <span id="yearDisplay">2024</span>
    </div>
    <input type="range" id="yearSlider" min="1997" max="2024" value="2024" disabled>
    <div class="year-ticks">
      <span>1997</span><span>2004</span><span>2011</span><span>2018</span><span>2024</span>
    </div>
  </div>

  <div id="legend"></div>
  <div id="info-panel">
    <p class="info-hint">Hover over a utility territory to see details.<br>Click to pin the panel. Click again to unpin.</p>
  </div>

  <div class="sidebar-footer" id="footerSub">
    Sources: EIA Form 176 &bull; PHMSA Annual Report
  </div>
</div>

<div id="map"></div>
<div id="trends-panel">
  <div class="trends-header">
    <div>
      <div class="trends-header-title">Utility Trends</div>
      <div class="trends-header-sub" id="trends-title-name"></div>
    </div>
    <button class="trends-close" onclick="closeTrendsPanel()" title="Close trends panel">&#10005;</button>
  </div>
  <div id="trends-body"></div>
</div>
<div id="incidents-panel">
  <div class="incidents-header">
    <div>
      <div class="incidents-header-title">Incidents</div>
      <div class="incidents-header-sub" id="incidents-title-name"></div>
    </div>
    <button class="incidents-close" onclick="closeIncidentsPanel()" title="Close incidents panel">&#10005;</button>
  </div>
  <div id="incidents-body"></div>
</div>
<div id="loading">Loading map&hellip; <small>Streaming tiles + timeseries</small></div>

  { key: "phmsa_NUM_SRVS_BY_DCD_2010_TO_2019", label: "2010s" },
  { key: "phmsa_NUM_SRVS_BY_DCD_2020_TO_2029", label: "2020s" },
];

const SALES_SECTORS = [
  { label: "Residential",    vl: "Residential Sales [VL]",    cs: "Residential Sales [CS]",    ct: "Residential Sales [CT]" },
  { label: "Commercial",     vl: "Commercial Sales [VL]",     cs: "Commercial Sales [CS]",     ct: "Commercial Sales [CT]" },
  { label: "Industrial",     vl: "Industrial Sales [VL]",     cs: "Industrial Sales [CS]",     ct: "Industrial Sales [CT]" },
  { label: "Electric Power", vl: "Electric Power Sales [VL]", cs: "Electric Power Sales [CS]", ct: "Electric Power Sales [CT]" },
  { label: "Vehicle Fuel",   vl: "Vehicle Fuel Sales [VL]",   cs: "Vehicle Fuel Sales [CS]",   ct: "Vehicle Fuel Sales [CT]" },

// ── Color utilities ────────────────────────────────────────────────────────────

function lerpRgb(a, b, t) {
  t = Math.max(0, Math.min(1, t));
  return [
    Math.round(a[0] + t * (b[0] - a[0])),
    Math.round(a[1] + t * (b[1] - a[1])),
    Math.round(a[2] + t * (b[2] - a[2])),
  ];
}
function rgbStr([r, g, b]) { return `rgb(${r},${g},${b})`; }

function multiStop(stops, t) {
  t = Math.max(0, Math.min(1, t));
  for (let i = 1; i < stops.length; i++) {
    if (t <= stops[i].at) {
      const s = (t - stops[i-1].at) / (stops[i].at - stops[i-1].at);
      return rgbStr(lerpRgb(stops[i-1].rgb, stops[i].rgb, s));
    }
  }
  return rgbStr(stops[stops.length - 1].rgb);
}

const SCALES = {
  age:      t => multiStop([
    { at: 0,    rgb: [68,  130, 204] },
    { at: 0.5,  rgb: [255, 230,  50] },
    { at: 1,    rgb: [180,   0,   0] },
  ], t),
  blue:     t => multiStop([{ at:0, rgb:[232,244,255] }, { at:1, rgb:[13,71,161] }], t),
  green:    t => multiStop([{ at:0, rgb:[240,255,240] }, { at:1, rgb:[27,94,32]  }], t),
  red:      t => multiStop([{ at:0, rgb:[255,245,245] }, { at:1, rgb:[160,0,0]   }], t),
  orange:   t => multiStop([{ at:0, rgb:[255,248,230] }, { at:1, rgb:[230,81,0]  }], t),
  purple:   t => multiStop([{ at:0, rgb:[248,244,255] }, { at:1, rgb:[74,20,140] }], t),
  teal:     t => multiStop([{ at:0, rgb:[232,248,250] }, { at:1, rgb:[0,96,100]  }], t),
  pricemap: t => multiStop([
    { at: 0,   rgb: [27,  94, 32]  },
    { at: 0.5, rgb: [255, 230, 50] },
    { at: 1,   rgb: [180,  0,  0]  },
  ], t),
  diverge: t => multiStop([
    { at: 0,    rgb: [13,  71, 161] },
    { at: 0.5,  rgb: [240, 240, 240] },
    { at: 1,    rgb: [160,   0,   0] },
  ], t),
};

// ── Color modes ────────────────────────────────────────────────────────────────

const MODES = {
  age:            { label: "Avg. Pipe Age",                 unit: "yrs",    scale: "age",      fixed: [0,  80]  },
  miles:          { label: "Total Pipeline Miles",          unit: "mi",     scale: "blue",     fixed: null       },
  pct_plastic:    { label: "% Plastic Pipe",               unit: "%",      scale: "green",    fixed: [0, 100]   },
  pct_ci:         { label: "% Cast Iron Pipe",             unit: "%",      scale: "red",      fixed: [0,  50]   },
  pct_pre1970:    { label: "% Pre-1970 Pipe",              unit: "%",      scale: "orange",   fixed: [0, 100]   },
  leaks:          { label: "Known Leaks",                  unit: "",       scale: "red",      fixed: null       },
  unacc:          { label: "Unaccounted-for Gas",          unit: "%",      scale: "red",      fixed: null       },
  res_vol:        { label: "Residential Sales Volume",     unit: "MMcf",   scale: "blue",     fixed: null       },
  res_price:      { label: "Residential Avg Price",        unit: "$/Mcf",  scale: "pricemap", fixed: null       },
  res_customers:  { label: "Residential Customers",        unit: "",       scale: "purple",   fixed: null       },
  com_price:      { label: "Commercial Avg Price",         unit: "$/Mcf",  scale: "pricemap", fixed: null       },
  total_sales_vol:{ label: "Total Sales Volume",           unit: "MMcf",   scale: "teal",     fixed: null       },
  total_customers:  { label: "Total Customers (Res+Com)",         unit: "",          scale: "purple",   fixed: null       },
  res_consumption:  { label: "Residential Consumption",           unit: "Mcf/cust",  scale: "blue",     fixed: null       },
  res_price_chg_10y:{ label: "Residential Price: 10-yr Real Δ",  unit: "Δ$/Mcf",    scale: "diverge",  fixed: null, diverging: true },
};

const DOMAINS = {};

function fmtVal(v, modeKey) {
  if (v == null || !isFinite(v)) return "—";
  const unit = MODES[modeKey] ? MODES[modeKey].unit : "";
  const n = fmtNum(v);
  if (unit === "$/Mcf")    return `$${v.toFixed(2)}/Mcf`;
  if (unit === "Δ$/Mcf")  return `${v >= 0 ? "+" : ""}$${v.toFixed(2)}/Mcf`;
  if (unit === "%")        return `${v.toFixed(1)}%`;
  if (unit === "yrs")      return `${v.toFixed(0)} yrs`;
  if (unit === "MMcf")     return `${n} MMcf`;
  if (unit === "mi")       return `${n} mi`;
  if (unit === "Mcf/cust") return `${v.toFixed(1)} Mcf/cust`;
  return n;
}

function fmtNum(v) {
  if (v == null) return "—";
  v = Number(v);  // coerce strings that slipped through as JSON string values
  if (isNaN(v))   return "—";
  if (v >= 1e6)  return (v/1e6).toFixed(2).replace(/\.?0+$/, "") + "M";
  if (v >= 1e3)  return (v/1e3).toFixed(1).replace(/\.?0+$/, "") + "K";
  return v.toLocaleString(undefined, { maximumFractionDigits: 1 });
}

// ── Timeseries state ──────────────────────────────────────────────────────────

let phmsaTimeseries = null;
let eiaTimeseries   = null;
let timeseriesReady = false;
let selectedYear    = "2024";

// Fields that don't change across years — pulled from GeoJSON properties
function buildStaticProps(p) {
  const out = {};
  for (const k of STATIC_KEYS) {
    if (p[k] !== undefined) out[k] = p[k];
  }
  return out;
}

// Merge static GeoJSON identifiers with timeseries data for selectedYear.
// Returns feat.properties unchanged if timeseries not yet loaded.
function getEffectiveProps(feat) {
  if (!timeseriesReady) return feat.properties;

  const p     = feat.properties;
  const opId  = p.phmsa_OPERATOR_ID;
  const stop  = p.phmsa_STOP;
  const eiaId = p.ID;

  const phmsaKey  = (opId != null && stop) ? `${opId}_${stop}` : null;
  const phmsaData = phmsaKey && phmsaTimeseries
    ? (phmsaTimeseries[phmsaKey]?.data?.[selectedYear] ?? null) : null;
  const eiaEntry = eiaId && eiaTimeseries ? (eiaTimeseries[eiaId] ?? null) : null;
  const eiaData  = eiaEntry?.data?.[selectedYear] ?? null;

  // Start from identifier-only fields (no stale metric data from GeoJSON)
  const merged = buildStaticProps(p);

  // Add PHMSA metrics (phmsa_ prefix)
  if (phmsaData) {
    for (const [k, v] of Object.entries(phmsaData)) {
      merged["phmsa_" + k] = v;
    }
  }

  // Add EIA metrics (column names already match GeoJSON)
  if (eiaData) {
    merged._eiaHasData = true;
    for (const [k, v] of Object.entries(eiaData)) {
      merged[k] = v;
    }
  }

  // Carry over entry-level metadata (backfill provenance)
  if (eiaEntry?._backfill) merged._backfill = eiaEntry._backfill;

  return merged;
}

// ── Value extractors ──────────────────────────────────────────────────────────

function avgAge(p) {
  let totalMi = 0, wsum = 0;
  for (const d of DECADES) {
    const m = p[d.key] || 0;
    if (m > 0) { totalMi += m; wsum += m * (NOW_YEAR - d.midYear); }
  }
  return totalMi > 0 ? wsum / totalMi : null;
}

function getValue(p, mode) {
  const total = p.phmsa_MMILES_TOTAL || 0;
  const dcdTotal = p.phmsa_MMILES_BY_DCD_TOTAL || 0;
  switch (mode) {
    case "age":      return avgAge(p);
    case "miles":    return total || null;
    case "pct_plastic":
      return total > 0 && p.phmsa_MMILES_PLASTIC != null ? p.phmsa_MMILES_PLASTIC / total * 100 : null;
    case "pct_ci": {
      const ci = (p.phmsa_MMILES_CI || 0) + (p.phmsa_MMILES_CI_WR_TOTAL || 0);
      return total > 0 ? ci / total * 100 : null;
    }
    case "pct_pre1970": {
      const pre = (p.phmsa_MMILES_BY_DCD_PRE1940 || 0) + (p.phmsa_MMILES_BY_DCD_1940_TO_1949 || 0)
                + (p.phmsa_MMILES_BY_DCD_1950_TO_1959 || 0) + (p.phmsa_MMILES_BY_DCD_1960_TO_1969 || 0);
      return dcdTotal > 0 ? pre / dcdTotal * 100 : null;
    }
    case "leaks":    return p.phmsa_KNOWN_LEAKS != null ? p.phmsa_KNOWN_LEAKS : null;
    case "unacc":    return p.phmsa_PERCENT_UNACC_GAS != null ? p.phmsa_PERCENT_UNACC_GAS : null;
    case "res_vol":  return p["Residential Sales [VL]"] || null;
    case "res_price": {
      const cs = p["Residential Sales [CS]"], vl = p["Residential Sales [VL]"];
      return cs && vl && vl > 0 ? cs / vl : null;
    }
    case "res_customers": return p["Residential Sales [CT]"] || null;
    case "com_price": {
      const cs = p["Commercial Sales [CS]"], vl = p["Commercial Sales [VL]"];
      return cs && vl && vl > 0 ? cs / vl : null;
    }
    case "total_sales_vol": {
      let tot = 0;
      for (const s of SALES_SECTORS) tot += p[s.vl] || 0;
      return tot > 0 ? tot : null;
    }
    case "total_customers": {
      const r = p["Residential Sales [CT]"] || 0, c = p["Commercial Sales [CT]"] || 0;
      return (r + c) > 0 ? r + c : null;
    }
    case "res_consumption": {
      const vl = p["Residential Sales [VL]"], ct = p["Residential Sales [CT]"];
      return vl && ct && ct > 0 ? vl / ct : null;
    }
    case "res_price_chg_10y": {
      const yr = +selectedYear;
      const yr10 = yr - 10;
      if (!eiaTimeseries || !p.ID) return null;
      const entry = eiaTimeseries[p.ID];
      if (!entry) return null;
      const d0 = entry.data?.[String(yr10)];
      const cs0 = d0?.["Residential Sales [CS]"], vl0 = d0?.["Residential Sales [VL]"];
      if (!cs0 || !vl0 || vl0 <= 0) return null;
      const cs1 = p["Residential Sales [CS]"], vl1 = p["Residential Sales [VL]"];
      if (!cs1 || !vl1 || vl1 <= 0) return null;
      const cpi0 = CPI_U[yr10], cpi1 = CPI_U[yr], cpi2024 = CPI_U[2024];
      if (!cpi0 || !cpi1) return null;
      const price0_real = (cs0 / vl0) * (cpi2024 / cpi0);
      const price1_real = (cs1 / vl1) * (cpi2024 / cpi1);
      return price1_real - price0_real;
    }
  }
  return null;
}

function modeColor(value, mode) {
  if (value == null || !isFinite(value)) return null;
  const [lo, hi] = DOMAINS[mode] || [0, 1];
  const t = hi > lo ? Math.max(0, Math.min(1, (value - lo) / (hi - lo))) : 0;
  return SCALES[MODES[mode].scale](t);
}

// ── Choropleth color expression ───────────────────────────────────────────────

function buildPropsForId(eiaId) {
  const eiaEntry = eiaTimeseries?.[eiaId];
  const eiaData  = eiaEntry?.data?.[selectedYear] ?? {};
  const phmsaKey = idMap[eiaId];
  const phmsaData = phmsaKey ? (phmsaTimeseries?.[phmsaKey]?.data?.[selectedYear] ?? {}) : {};
  const p = { ID: eiaId, EIA_state: eiaEntry?.state, ...eiaData };
  for (const [k, v] of Object.entries(phmsaData)) p["phmsa_" + k] = v;
  return p;
}

function rebuildColorExpression() {
  if (!mapLoaded) return;
  const pairs = [];
  for (const eiaId of Object.keys(eiaTimeseries || {})) {
    const p   = buildPropsForId(eiaId);
    const val = getValue(p, currentMode);
    const col = modeColor(val, currentMode);
    if (col) pairs.push(eiaId, col);
  }
  const expr = pairs.length
    ? ["match", ["get", "ID"], ...pairs, "#e0e0e0"]
    : "#e0e0e0";
  map.setPaintProperty("utilities-fill", "fill-color", expr);
  updateLegend();
}

// ── Domain computation ────────────────────────────────────────────────────────

function computeDomains() {
  const vals = {};
  for (const k of Object.keys(MODES)) vals[k] = [];
  for (const eiaId of Object.keys(eiaTimeseries || {})) {
    const p = buildPropsForId(eiaId);
    for (const k of Object.keys(MODES)) {
      const v = getValue(p, k);
      if (v != null && isFinite(v)) vals[k].push(v);
    }
  }
  for (const k of Object.keys(MODES)) {
    const m = MODES[k];
    if (m.fixed) { DOMAINS[k] = m.fixed; continue; }
    const arr = vals[k].sort((a, b) => a - b);
    if (!arr.length) { DOMAINS[k] = [0, 1]; continue; }
    if (m.diverging) {
      const absMax = Math.max(
        Math.abs(arr[Math.floor(arr.length * 0.02)]),
        Math.abs(arr[Math.floor(arr.length * 0.98)]),
        0.01
      );
      DOMAINS[k] = [-absMax, absMax];
    } else {
      const lo = arr[Math.floor(arr.length * 0.02)];
      const hi = arr[Math.floor(arr.length * 0.95)];
      DOMAINS[k] = [lo, hi > lo ? hi : lo + 1];
    }
  }
}

// ── MapLibre event handlers ───────────────────────────────────────────────────

function setPinnedState(feat, pinned) {
  if (!feat) return;
  map.setFeatureState(
    { source: "utilities", sourceLayer: "utilities", id: feat.properties.ID },
    { pinned }
  );
}

function setHoveredState(id, hovered) {
  if (id == null) return;
  map.setFeatureState(
    { source: "utilities", sourceLayer: "utilities", id },
    { hovered }
  );
}

map.on("mousemove", "utilities-fill", (e) => {
  if (pinnedFeat) return;
  if (!e.features.length) return;
  const feat = e.features[0];
  const id   = feat.properties.ID;
  if (hoveredId !== null && hoveredId !== id) setHoveredState(hoveredId, false);
  hoveredId = id;
  setHoveredState(id, true);
  map.getCanvas().style.cursor = "pointer";
  updateInfo(feat, false);
});

map.on("mouseleave", "utilities-fill", () => {
  if (pinnedFeat) return;
  if (hoveredId !== null) { setHoveredState(hoveredId, false); hoveredId = null; }
  map.getCanvas().style.cursor = "";
  updateInfo(null, false);
});

map.on("click", "utilities-fill", (e) => {
  if (!e.features.length) return;
  const feat = e.features[0];
  if (pinnedFeat && pinnedFeat.properties.ID === feat.properties.ID) {
    setPinnedState(pinnedFeat, false);
    pinnedFeat = null;
    updateInfo(null, false);
  } else {
    if (pinnedFeat) setPinnedState(pinnedFeat, false);
    pinnedFeat = feat;
    setPinnedState(feat, true);
    updateInfo(feat, true);
    if (trendsOpenFeat) openTrendsPanel(feat);
  }
  e.originalEvent.stopPropagation();
});

map.on("click", (e) => {
  if (!pinnedFeat) return;
  // General click events don't carry features — query at the click point instead
  const hits = map.queryRenderedFeatures(e.point, { layers: ["utilities-fill"] });
  if (!hits.length) {
    setPinnedState(pinnedFeat, false);
    pinnedFeat = null;
    updateInfo(null, false);
  }
});

function updateLegend() {
  const m = MODES[currentMode];
  const [lo, hi] = DOMAINS[currentMode] || [0, 1];
  const scale = SCALES[m.scale];

  const stops = [0, 0.25, 0.5, 0.75, 1]
    .map(t => `${scale(t)} ${t * 100}%`).join(", ");

  const lbl = [lo, (lo + hi) / 2, hi].map(v => fmtVal(v, currentMode));

  document.getElementById("legend").innerHTML = `
    <div class="legend-title">${m.label}${m.unit ? " (" + m.unit + ")" : ""}</div>
    <div class="legend-gradient" style="background: linear-gradient(to right, ${stops})"></div>
    <div class="legend-labels"><span>${lbl[0]}</span><span>${lbl[1]}</span><span>${lbl[2]}</span></div>
    <div class="legend-na"><div class="legend-na-swatch"></div> No data</div>
  `;
}

function dataYearRange(dataObj) {
  if (!dataObj) return null;
  const years = Object.keys(dataObj).map(Number).sort((a, b) => a - b);
  if (!years.length) return null;
  return years.length === 1 ? `${years[0]}` : `${years[0]}–${years[years.length - 1]}`;
}

function buildEiaNameEntries(eiaId) {
  if (!eiaTimeseries || !eiaId) return [];
  const entry = eiaTimeseries[eiaId];
  if (!entry) return [];
  const allDataYears = Object.keys(entry.data || {}).map(Number).sort((a, b) => a - b);
  const backfill = entry._backfill || [];
  const backfillYears = new Set();
  for (const b of backfill) {
    for (let y = b.from; y <= b.to; y++) backfillYears.add(y);
  }
  const mainYears = allDataYears.filter(y => !backfillYears.has(y));
  const entries = [];
  if (mainYears.length) {
    entries.push({ name: entry.name, from: mainYears[0], to: mainYears[mainYears.length - 1] });
  }
  for (const b of backfill) {
    entries.push({ name: b.name, from: b.from, to: b.to });
  }
  return entries;
}

// Returns the list of states that share the same MMILES_TOTAL as `stop` in `yr`
// (>= 2 states with the same non-trivial total = PHMSA combined filing).
// Returns null if this polygon's state is not part of a combined group.
function getMultiStateGroup(opId, stop, yr) {
  if (!phmsaTimeseries || !operatorStateMap[opId]) return null;
  const allStates = operatorStateMap[opId];
  if (allStates.length < 2) return null;
  const totals = {};
  for (const st of allStates) {
    const v = phmsaTimeseries[`${opId}_${st}`]?.data?.[yr]?.MMILES_TOTAL;
    if (v != null && v > 100) totals[st] = v;
  }
  const myVal = totals[stop];
  if (myVal == null) return null;
  const group = Object.entries(totals)
    .filter(([, v]) => v === myVal)
    .map(([st]) => st)
    .sort();
  return group.length >= 2 ? group : null;
}

function nameEntryHtml(entries, singleLabel, groupLabel) {
  if (!entries.length) return "";
  if (entries.length === 1) {
    return statRow(singleLabel, escHtml(entries[0].name));
  }
  let h = `<div class="name-group"><div class="name-group-label">${groupLabel}</div>`;
  for (const e of entries) {
    const range = e.from === e.to ? `${e.from}` : `${e.from}–${e.to}`;
    h += `<div class="name-entry">
      <span class="name-entry-name">${escHtml(e.name)}</span>
      <span class="name-entry-years">${range}</span>
    </div>`;
  }
  return h + `</div>`;
}

// ── Info panel ────────────────────────────────────────────────────────────────

function updateInfo(feat, pinned) {
  currentInfoFeat = feat;
  const panel = document.getElementById("info-panel");
  if (!feat) {
    panel.innerHTML = `<p class="info-hint">Hover over a utility territory to see details.<br>Click to pin the panel.</p>`;
    return;
  }

  const p  = getEffectiveProps(feat);
  const yr = selectedYear;

  const name     = p.Name || p.geo_NAME || p.phmsa_OPERATOR_NAME || "Unknown";
  const stateLbl = [p.EIA_state, p.phmsa_STOP, p.geo_LOCATION].filter(Boolean).find(Boolean) || "";
  const rawType  = p.TYPE || "";
  const typeLbl  = rawType
    ? rawType.charAt(0).toUpperCase() + rawType.slice(1).toLowerCase().replace(/-([a-z])/g, (_, c) => "-" + c.toUpperCase())
    : "";
  const subParts = [stateLbl, typeLbl].filter(Boolean);

  // Timeseries entry references
  const eiaId    = p.ID;
  const opId     = p.phmsa_OPERATOR_ID;
  const stop     = p.phmsa_STOP;
  const phmsaKey = (opId != null && stop) ? `${opId}_${stop}` : null;
  const eiaEntry   = eiaId    && eiaTimeseries   ? eiaTimeseries[eiaId]     : null;
  const phmsaEntry = phmsaKey && phmsaTimeseries  ? phmsaTimeseries[phmsaKey] : null;

  const eiaYears   = eiaEntry   ? dataYearRange(eiaEntry.data)   : null;
  const phmsaYears = phmsaEntry ? dataYearRange(phmsaEntry.data) : null;

  // ── Header
  let html = `
    <div class="info-name">${escHtml(name)}</div>
    <div class="info-sub">${escHtml(subParts.join(" • "))}</div>
  `;

  // ── Data availability chips
  if (eiaYears || phmsaYears) {
    html += `<div class="data-avail-row">`;
    if (eiaYears)   html += `<span class="src-chip src-eia">EIA  ${eiaYears}</span>`;
    if (phmsaYears) html += `<span class="src-chip src-phmsa">PHMSA  ${phmsaYears}</span>`;
    html += `</div>`;
  }

  // ── EIA Sales section
  const hasAnySales = SALES_SECTORS.some(s => p[s.vl] != null || p[s.cs] != null);
  if (hasAnySales || p._eiaHasData) {
    html += `<div class="info-section"><div class="info-section-title">Sales (EIA Form 176, ${yr})</div>`;
    if (hasAnySales) {
      html += `<table class="sales-table"><thead><tr>
        <th>Sector</th><th>Vol (MMcf)</th><th>Customers</th><th>$/Mcf</th>
      </tr></thead><tbody>`;
      let tvl = 0, tcs = 0, tct = 0;
      for (const s of SALES_SECTORS) {
        const vl = p[s.vl], cs = p[s.cs], ct = p[s.ct];
        if (!vl && !cs && !ct) continue;
        const price = vl && cs && vl > 0 ? cs / vl : null;
        tvl += vl || 0; tcs += cs || 0; tct += ct || 0;
        html += `<tr>
          <td>${s.label}</td>
          <td>${vl != null ? fmtNum(vl) : "—"}</td>
          <td>${ct != null ? fmtNum(ct) : "—"}</td>
          <td>${price != null ? "$" + price.toFixed(2) : "—"}</td>
        </tr>`;
      }
      const avgP = tvl > 0 && tcs > 0 ? tcs / tvl : null;
      html += `<tr class="total-row">
        <td>Total</td>
        <td>${tvl > 0 ? fmtNum(tvl) : "—"}</td>
        <td>${tct > 0 ? fmtNum(tct) : "—"}</td>
        <td>${avgP != null ? "$" + avgP.toFixed(2) : "—"}</td>
      </tr>`;
      html += `</tbody></table>`;
      // Consumption per customer
      const resVl = p["Residential Sales [VL]"], resCt = p["Residential Sales [CT]"];
      if (resVl && resCt && resCt > 0) {
        html += statRow("Res. consumption/customer", (resVl / resCt).toFixed(1) + " Mcf");
      }
      // 10-year real price change
      const yrN = +yr;
      const yr10 = yrN - 10;
      if (yrN >= 2007 && eiaTimeseries && p.ID) {
        const entry10 = eiaTimeseries[p.ID];
        const d10 = entry10?.data?.[String(yr10)];
        const cs10 = d10?.["Residential Sales [CS]"], vl10 = d10?.["Residential Sales [VL]"];
        const cs1 = p["Residential Sales [CS]"], vl1 = p["Residential Sales [VL]"];
        const cpi10 = CPI_U[yr10], cpiN = CPI_U[yrN], cpi24 = CPI_U[2024];
        if (cs10 && vl10 && vl10 > 0 && cs1 && vl1 && vl1 > 0 && cpi10 && cpiN) {
          const p10r = (cs10 / vl10) * (cpi24 / cpi10);
          const p1r  = (cs1  / vl1)  * (cpi24 / cpiN);
          const chg  = p1r - p10r;
          const sign = chg >= 0 ? "+" : "";
          html += statRow(
            `Real price chg (${yr10}–${yrN}, 2024$)`,
            `${sign}$${chg.toFixed(2)}/Mcf`
          );
        }
      }
      // Supply / delivery price breakdown
      const infoState = p.phmsa_STOP || p.EIA_state;
      const resCs2 = p["Residential Sales [CS]"], resVl2 = p["Residential Sales [VL]"];
      const resPr2  = resCs2 && resVl2 && resVl2 > 0 ? resCs2 / resVl2 : null;
      const cgPrice = infoState ? (CITYGATE_PRICE[infoState]?.[String(yr)] ?? null) : null;
      if (resPr2 != null && cgPrice != null) {
        html += statRow("Supply price (citygate)", `$${cgPrice.toFixed(2)}/Mcf`);
        html += statRow("Delivery price", `$${(resPr2 - cgPrice).toFixed(2)}/Mcf`);
      }
    } else {
      html += `<div style="color:#999;font-size:11px;padding:3px 0 5px">No retail sales data reported</div>`;
    }
    const supply = p["Total Supply [VL]"], disp = p["Total Disposition [VL]"];
    const heat   = p["Heat Content of Delivered Gas (BTU/cf) [VL]"];
    const losses = p["Losses from Leaks [VL]"];
    if (supply) html += `<div style="margin-top:6px">` + statRow("Total Supply",      fmtNum(supply) + " MMcf") + `</div>`;
    if (disp)   html += statRow("Total Disposition", fmtNum(disp) + " MMcf");
    if (heat)   html += statRow("Heat Content",      fmtNum(heat) + " BTU/cf");
    if (losses) html += statRow("Losses (Leaks)",    fmtNum(losses) + " MMcf");
    html += `</div>`;
  }

  // ── PHMSA Infrastructure section
  if (p.phmsa_MMILES_TOTAL != null) {
    const age    = avgAge(p);
    const total  = p.phmsa_MMILES_TOTAL;
    const pctPl  = total > 0 && p.phmsa_MMILES_PLASTIC != null ? p.phmsa_MMILES_PLASTIC / total * 100 : null;
    const ciMi   = (p.phmsa_MMILES_CI || 0) + (p.phmsa_MMILES_CI_WR_TOTAL || 0);
    const pctCi  = total > 0 ? ciMi / total * 100 : null;
    const pre70  = (p.phmsa_MMILES_BY_DCD_PRE1940 || 0) + (p.phmsa_MMILES_BY_DCD_1940_TO_1949 || 0)
                 + (p.phmsa_MMILES_BY_DCD_1950_TO_1959 || 0) + (p.phmsa_MMILES_BY_DCD_1960_TO_1969 || 0);
    const dcdTot = p.phmsa_MMILES_BY_DCD_TOTAL || 0;

    const multiStateGroup = getMultiStateGroup(opId, stop, yr);
    const multiStateHtml = multiStateGroup
      ? ` <span style="font-weight:700;color:#c0392b">&#9679; Multi-state: ${multiStateGroup.join(", ")}</span>`
      : "";
    html += `<div class="info-section"><div class="info-section-title">Infrastructure (PHMSA, ${yr})${multiStateHtml}</div>`;

    // ── Mains subsection
    html += `<div class="subsec-hdr">Mains</div>`;
    if (age  != null)  html += statRow("Avg. Pipe Age",    `${age.toFixed(0)} yrs`);
    html += statRow("Total Miles", fmtNum(total));
    if (pctPl != null) html += statRow("% Plastic",         `${pctPl.toFixed(1)}%`);
    if (pctCi != null && pctCi > 0) html += statRow("% Cast Iron", `${pctCi.toFixed(1)}%`);
    if (dcdTot > 0)    html += statRow("% Pre-1970",        `${(pre70/dcdTot*100).toFixed(1)}%`);
    if (p.phmsa_KNOWN_LEAKS != null) html += statRow("Known Leaks", fmtNum(p.phmsa_KNOWN_LEAKS));
    if (p.phmsa_PERCENT_UNACC_GAS != null) html += statRow("Unaccounted-for Gas", `${Number(p.phmsa_PERCENT_UNACC_GAS).toFixed(1)}%`);

    const dcdVals    = DECADES.map(d => p[d.key] || 0);
    const dcdSumKnown = dcdVals.reduce((a, b) => a + b, 0);
    const dcdUnknown = Math.max(0, dcdTot - dcdSumKnown);
    const dcdMax     = Math.max(...dcdVals, dcdUnknown);
    if (dcdMax > 0) {
      html += `<div style="margin-top:7px;margin-bottom:3px;font-size:9px;font-weight:700;text-transform:uppercase;color:#888;letter-spacing:.5px">Miles by Decade Installed</div>`;
      DECADES.forEach((d, i) => {
        if (dcdVals[i] === 0) return;
        const barW = (dcdVals[i] / dcdMax * 100).toFixed(0);
        html += `<div class="decade-row">
          <span class="decade-lbl">${d.label}</span>
          <div class="bar-wrap"><div class="bar-inner" style="width:${barW}%;background:#5c85b4"></div></div>
          <span class="bar-val">${fmtNum(dcdVals[i])}</span>
        </div>`;
      });
      if (dcdUnknown > 0.05) {
        const barW = (dcdUnknown / dcdMax * 100).toFixed(0);
        html += `<div class="decade-row">
          <span class="decade-lbl" style="color:#aaa;font-style:italic">Unknown</span>
          <div class="bar-wrap"><div class="bar-inner" style="width:${barW}%;background:#bbb"></div></div>
          <span class="bar-val" style="color:#aaa">${fmtNum(dcdUnknown)}</span>
        </div>`;
      }
    }

    const matVals = MATERIALS.map(m => p[m.key] || 0);
    const matMax  = Math.max(...matVals);
    if (matMax > 0) {
      html += `<div style="margin-top:7px;margin-bottom:3px;font-size:9px;font-weight:700;text-transform:uppercase;color:#888;letter-spacing:.5px">Miles by Material</div>`;
      MATERIALS.forEach((m, i) => {
        if (matVals[i] === 0) return;
        const barW = (matVals[i] / matMax * 100).toFixed(0);
        html += `<div class="mat-row">
          <div class="mat-swatch" style="background:${m.color}"></div>
          <span class="mat-lbl">${m.label}</span>
          <div class="mat-bar-wrap"><div class="mat-bar-inner" style="width:${barW}%;background:${m.color}"></div></div>
          <span class="mat-val">${fmtNum(matVals[i])}</span>
        </div>`;
      });
    }

    // ── Services subsection
    const svcTotal = p.phmsa_NUM_SRVCS_TOTAL;
    if (svcTotal != null && svcTotal > 0) {
      const svcCi    = p.phmsa_NUM_SRVS_CI || 0;
      const pctSvcCi = svcCi > 0 ? svcCi / svcTotal * 100 : null;
      html += `<div class="subsec-hdr">Services</div>`;
      html += statRow("Total Services", fmtNum(svcTotal));
      if (pctSvcCi != null) html += statRow("% Cast Iron", `${pctSvcCi.toFixed(1)}%`);

      const svcMatVals = SVC_MATERIALS.map(m => p[m.key] || 0);
      const svcMatMax  = Math.max(...svcMatVals);
      if (svcMatMax > 0) {
        html += `<div style="margin-top:7px;margin-bottom:3px;font-size:9px;font-weight:700;text-transform:uppercase;color:#888;letter-spacing:.5px">Services by Material</div>`;
        SVC_MATERIALS.forEach((m, i) => {
          if (svcMatVals[i] === 0) return;
          const barW = (svcMatVals[i] / svcMatMax * 100).toFixed(0);
          html += `<div class="mat-row">
            <div class="mat-swatch" style="background:${m.color}"></div>
            <span class="mat-lbl">${m.label}</span>
            <div class="mat-bar-wrap"><div class="mat-bar-inner" style="width:${barW}%;background:${m.color}"></div></div>
            <span class="mat-val">${fmtNum(svcMatVals[i])}</span>
          </div>`;
        });
      }

      const svcDcdVals = SVC_DECADES.map(d => p[d.key] || 0);
      const svcDcdUnk  = p.phmsa_NUM_SRVS_BY_DCD_UNK || 0;
      const svcDcdMax  = Math.max(...svcDcdVals, svcDcdUnk);
      if (svcDcdMax > 0) {
        html += `<div style="margin-top:7px;margin-bottom:3px;font-size:9px;font-weight:700;text-transform:uppercase;color:#888;letter-spacing:.5px">Services by Decade Installed</div>`;
        SVC_DECADES.forEach((d, i) => {
          if (svcDcdVals[i] === 0) return;
          const barW = (svcDcdVals[i] / svcDcdMax * 100).toFixed(0);
          html += `<div class="decade-row">
            <span class="decade-lbl">${d.label}</span>
            <div class="bar-wrap"><div class="bar-inner" style="width:${barW}%;background:#5c85b4"></div></div>
            <span class="bar-val">${fmtNum(svcDcdVals[i])}</span>
          </div>`;
        });
        if (svcDcdUnk > 0) {
          const barW = (svcDcdUnk / svcDcdMax * 100).toFixed(0);
          html += `<div class="decade-row">
            <span class="decade-lbl" style="color:#aaa;font-style:italic">Unknown</span>
            <div class="bar-wrap"><div class="bar-inner" style="width:${barW}%;background:#bbb"></div></div>
            <span class="bar-val" style="color:#aaa">${fmtNum(svcDcdUnk)}</span>
          </div>`;
        }
      }
    }

    html += `</div>`;
  }

  // ── Identifiers section
  html += `<div class="info-section"><div class="info-section-title">Identifiers</div>`;

  // EIA name(s) with year ranges
  if (eiaId) {
    const nameEntries = buildEiaNameEntries(eiaId);
    html += nameEntryHtml(nameEntries, "EIA Name", "EIA Name");
  }

  // PHMSA name (year range only if multiple names — not currently tracked, so omit)
  if (p.phmsa_OPERATOR_NAME) {
    html += statRow("PHMSA Name", escHtml(p.phmsa_OPERATOR_NAME));
  }

  // Territory name (always show)
  if (p.geo_NAME) {
    html += statRow("Territory Name", escHtml(p.geo_NAME));
  }

  // EIA ID
  if (eiaId) html += statRow("EIA ID", escHtml(eiaId));

  // PHMSA ID
  if (opId != null) {
    html += statRow("PHMSA ID", escHtml(String(opId).replace(/\.0$/, "")));
  }

  html += `</div>`;

  if (pinned) {
    if (eiaId || phmsaKey) {
      html += `<button class="trends-btn" onclick="openTrendsPanel(currentInfoFeat)">View Trends &#8594;</button>`;
    }
    if (opId != null && incidentsData) {
      const opKey = String(opId).replace(/\.0$/, "");
      const incRows = incidentsData[opKey];
      if (incRows && incRows.length > 0) {
        html += `<button class="incidents-btn" onclick="openIncidentsPanel(currentInfoFeat)">View Incidents (${incRows.length}) &#9888;</button>`;
      }
    }
    html += `<p class="pinned-note">Pinned — click territory again or click map to unpin</p>`;
  }

  panel.innerHTML = html;
}

function statRow(label, val) {
  return `<div class="stat-row"><span class="stat-label">${label}</span><span class="stat-val">${val}</span></div>`;
}

// ── Incidents panel ────────────────────────────────────────────────────────────

let incidentsSortCol = "inc_year";
let incidentsSortAsc = true;

function openIncidentsPanel(feat) {
  if (!feat) return;
  const p = getEffectiveProps(feat);
  const opId = p.phmsa_OPERATOR_ID;
  if (opId == null || !incidentsData) return;
  const opKey = String(opId).replace(/\.0$/, "");
  const rows = incidentsData[opKey];
  if (!rows || rows.length === 0) return;

  const name = p.Name || p.geo_NAME || p.phmsa_OPERATOR_NAME || "Unknown";
  document.getElementById("incidents-title-name").textContent = name;
  document.getElementById("incidents-panel").classList.add("open");

  incidentsSortCol = "inc_year";
  incidentsSortAsc = true;
  renderIncidentsTable(rows);
}

function closeIncidentsPanel() {
  document.getElementById("incidents-panel").classList.remove("open");
}

function renderIncidentsTable(rows) {
  const sorted = [...rows].sort((a, b) => {
    const va = a[incidentsSortCol] ?? "";
    const vb = b[incidentsSortCol] ?? "";
    const cmp = (typeof va === "number" && typeof vb === "number")
      ? va - vb
      : String(va).localeCompare(String(vb));
    return incidentsSortAsc ? cmp : -cmp;
  });

  const cols = [
    { key: "inc_year",       label: "Year",      cls: "col-year"  },
    { key: "fatal",          label: "Fatalities",cls: "col-fatal"  },
    { key: "injure",         label: "Injuries",  cls: "col-injure" },
    { key: "map_seven_cause",label: "Cause",     cls: "col-cause"  },
    { key: "NARRATIVE",      label: "Narrative", cls: "col-narrative" },
  ];

  const thHtml = cols.map(c => {
    let cls = c.cls;
    if (c.key === incidentsSortCol) cls += incidentsSortAsc ? " sorted-asc" : " sorted-desc";
    return `<th class="${cls}" onclick="incidentsSortBy('${c.key}')">${c.label}</th>`;
  }).join("");

  const rowsHtml = sorted.map(r => {
    const yr     = r.inc_year  ?? "—";
    const fatal  = r.fatal  != null ? r.fatal  : "—";
    const injure = r.injure != null ? r.injure : "—";
    const cause  = escHtml(r.map_seven_cause || "—");
    const narr   = escHtml(r.NARRATIVE || "");
    const fatalCls  = (r.fatal  > 0) ? " fatal-nonzero"  : "";
    const injureCls = (r.injure > 0) ? " injure-nonzero" : "";
    return `<tr>
      <td class="col-year">${yr}</td>
      <td class="col-fatal${fatalCls}">${fatal}</td>
      <td class="col-injure${injureCls}">${injure}</td>
      <td class="col-cause">${cause}</td>
      <td class="col-narrative">${narr}</td>
    </tr>`;
  }).join("");

  document.getElementById("incidents-body").innerHTML = `
    <table class="incidents-table">
      <thead><tr>${thHtml}</tr></thead>
      <tbody>${rowsHtml}</tbody>
    </table>`;
}

function incidentsSortBy(col) {
  if (incidentsSortCol === col) {
    incidentsSortAsc = !incidentsSortAsc;
  } else {
    incidentsSortCol = col;
    incidentsSortAsc = col === "inc_year";
  }
  const p = getEffectiveProps(currentInfoFeat);
  const opKey = String(p.phmsa_OPERATOR_ID).replace(/\.0$/, "");
  renderIncidentsTable(incidentsData[opKey]);
}

function destroyTrendCharts() {
  for (const c of Object.values(trendCharts)) {
    try { c.destroy(); } catch(e) {}
  }
  trendCharts = {};
}

function assembleTrendsData(eiaId, phmsaKey, state) {
  const cpi24 = CPI_U[2024];
  const years = [], nomPrice = [], realPrice = [], totVol = [], perCust = [], ciMiles = [];
  const supplyPr = [];
  const dcdPre70 = [], dcd7090 = [], dcd0010 = [], dcd20s = [], dcdUnknown = [];
  // Material breakdown — mains miles
  const matPlastic = [], matStCp = [], matStUnp = [], matCI = [], matDI = [], matCu = [], matOther = [];
  // Services by installation era
  const srvDcdPre70 = [], srvDcd7090 = [], srvDcd0010 = [], srvDcd20s = [], srvDcdUnk = [];
  // Services by material
  const srvPlastic = [], srvStCp = [], srvStUnp = [], srvCI = [], srvDI = [], srvCu = [], srvOther = [];

  for (let yr = 1997; yr <= 2025; yr++) {
    const yrStr = String(yr);
    const ed = eiaId    ? eiaTimeseries?.[eiaId]?.data?.[yrStr]      : null;
    const pd = phmsaKey ? phmsaTimeseries?.[phmsaKey]?.data?.[yrStr] : null;
    const cs  = ed?.["Residential Sales [CS]"] ?? null;
    const vl  = ed?.["Residential Sales [VL]"] ?? null;
    const ct  = ed?.["Residential Sales [CT]"] ?? null;
    const cpi = CPI_U[yr];
    const resPr = cs && vl && vl > 0 ? cs / vl : null;
    const cg    = state ? (CITYGATE_PRICE[state]?.[yrStr] ?? null) : null;
    years.push(yr);
    nomPrice.push(resPr);
    realPrice.push(resPr && cpi ? resPr * (cpi24 / cpi) : null);
    totVol.push(vl ?? null);
    perCust.push(vl && ct && ct > 0 ? vl / ct : null);
    supplyPr.push(cg);
    if (pd) {
      const ci = (pd.MMILES_CI || 0) + (pd.MMILES_CI_WR_TOTAL || 0);
      ciMiles.push(ci > 0 ? ci : null);
      if (pd.MMILES_BY_DCD_TOTAL > 0) {
        const pre70 = (pd.MMILES_BY_DCD_PRE1940     || 0) + (pd.MMILES_BY_DCD_1940_TO_1949 || 0)
                    + (pd.MMILES_BY_DCD_1950_TO_1959 || 0) + (pd.MMILES_BY_DCD_1960_TO_1969 || 0);
        const d7090 = (pd.MMILES_BY_DCD_1970_TO_1979 || 0) + (pd.MMILES_BY_DCD_1980_TO_1989 || 0)
                    + (pd.MMILES_BY_DCD_1990_TO_1999  || 0);
        const d0010 = (pd.MMILES_BY_DCD_2000_TO_2009  || 0) + (pd.MMILES_BY_DCD_2010_TO_2019 || 0);
        const d20   =  pd.MMILES_BY_DCD_2020_TO_2029  || 0;
        const unk   = Math.max(0, pd.MMILES_BY_DCD_TOTAL - (pre70 + d7090 + d0010 + d20));
        dcdPre70.push(pre70); dcd7090.push(d7090); dcd0010.push(d0010);
        dcd20s.push(d20); dcdUnknown.push(unk);
      } else {
        dcdPre70.push(null); dcd7090.push(null); dcd0010.push(null);
        dcd20s.push(null); dcdUnknown.push(null);
      }
      // Miles by material
      const mTotal = pd.MMILES_TOTAL || 0;
      if (mTotal > 0) {
        matPlastic.push(pd.MMILES_PLASTIC || 0);
        matStCp.push((pd.MMILES_STEEL_CP_BARE || 0) + (pd.MMILES_STEEL_CP_COATED || 0));
        matStUnp.push((pd.MMILES_STEEL_UNP_BARE || 0) + (pd.MMILES_STEEL_UNP_COATED || 0));
        matCI.push(pd.MMILES_CI || 0);
        matDI.push(pd.MMILES_DI || 0);
        matCu.push(pd.MMILES_CU || 0);
        matOther.push(pd.MMILES_OTHER || 0);
      } else {
        matPlastic.push(null); matStCp.push(null); matStUnp.push(null);
        matCI.push(null); matDI.push(null); matCu.push(null); matOther.push(null);
      }
      // Services by installation era
      const sTotal = pd.NUM_SRVS_BY_DCD_TOTAL || 0;
      if (sTotal > 0) {
        const sp70  = (pd.NUM_SRVS_BY_DCD_PRE1940      || 0) + (pd.NUM_SRVS_BY_DCD_1940_TO_1949 || 0)
                    + (pd.NUM_SRVS_BY_DCD_1950_TO_1959  || 0) + (pd.NUM_SRVS_BY_DCD_1960_TO_1969 || 0);
        const s7090 = (pd.NUM_SRVS_BY_DCD_1970_TO_1979  || 0) + (pd.NUM_SRVS_BY_DCD_1980_TO_1989 || 0)
                    + (pd.NUM_SRVS_BY_DCD_1990_TO_1999   || 0);
        const s0010 = (pd.NUM_SRVS_BY_DCD_2000_TO_2009   || 0) + (pd.NUM_SRVS_BY_DCD_2010_TO_2019 || 0);
        const s20   =  pd.NUM_SRVS_BY_DCD_2020_TO_2029   || 0;
        const sUnk  = Math.max(0, sTotal - (sp70 + s7090 + s0010 + s20));
        srvDcdPre70.push(sp70); srvDcd7090.push(s7090); srvDcd0010.push(s0010);
        srvDcd20s.push(s20); srvDcdUnk.push(sUnk);
      } else {
        srvDcdPre70.push(null); srvDcd7090.push(null); srvDcd0010.push(null);
        srvDcd20s.push(null); srvDcdUnk.push(null);
      }
      // Services by material
      const smTotal = pd.NUM_SRVCS_TOTAL || 0;
      if (smTotal > 0) {
        srvPlastic.push(pd.NUM_SRVS_PLASTIC || 0);
        srvStCp.push((pd.NUM_SRVS_STEEL_CP_BARE || 0) + (pd.NUM_SRVS_STEEL_CP_COATED || 0));
        srvStUnp.push((pd.NUM_SRVS_STEEL_UNP_BARE || 0) + (pd.NUM_SRVS_STEEL_UNP_COATED || 0));
        srvCI.push(pd.NUM_SRVS_CI || 0);
        srvDI.push(pd.NUM_SRVS_DI || 0);
        srvCu.push(pd.NUM_SRVS_CU || 0);
        srvOther.push(pd.NUM_SRVS_OTHER || 0);
      } else {
        srvPlastic.push(null); srvStCp.push(null); srvStUnp.push(null);
        srvCI.push(null); srvDI.push(null); srvCu.push(null); srvOther.push(null);
      }
    } else {
      ciMiles.push(null);
      dcdPre70.push(null); dcd7090.push(null); dcd0010.push(null);
      dcd20s.push(null); dcdUnknown.push(null);
      matPlastic.push(null); matStCp.push(null); matStUnp.push(null);
      matCI.push(null); matDI.push(null); matCu.push(null); matOther.push(null);
      srvDcdPre70.push(null); srvDcd7090.push(null); srvDcd0010.push(null);
      srvDcd20s.push(null); srvDcdUnk.push(null);
      srvPlastic.push(null); srvStCp.push(null); srvStUnp.push(null);
      srvCI.push(null); srvDI.push(null); srvCu.push(null); srvOther.push(null);
    }
  }
  return {
    years, nomPrice, realPrice, totVol, perCust, ciMiles, supplyPr,
    dcdPre70, dcd7090, dcd0010, dcd20s, dcdUnknown,
    matPlastic, matStCp, matStUnp, matCI, matDI, matCu, matOther,
    srvDcdPre70, srvDcd7090, srvDcd0010, srvDcd20s, srvDcdUnk,
    srvPlastic, srvStCp, srvStUnp, srvCI, srvDI, srvCu, srvOther,
  };
}

function makeStackedAreaChart(canvasId, labels, datasets, yTickFmt) {
  const ctx = document.getElementById(canvasId);
  if (!ctx) return null;
  return new Chart(ctx, {
    type: "line",
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: true, position: "bottom", labels: { boxWidth: 10, font: { size: 9 }, padding: 5 } },
        tooltip: {
          mode: "index",
          intersect: false,
          itemSort: (a, b) => b.datasetIndex - a.datasetIndex,
          callbacks: {
            label: function(ctx) {
              const cumVal = ctx.raw;
              if (cumVal == null) return null;
              const dsIdx   = ctx.datasetIndex;
              const dataIdx = ctx.dataIndex;
              const prevCum = dsIdx > 0 ? (ctx.chart.data.datasets[dsIdx - 1].data[dataIdx] ?? 0) : 0;
              const actual  = cumVal - prevCum;
              if (actual <= 0) return null;
              const fmt = yTickFmt ? yTickFmt(actual) : String(actual);
              return `${ctx.dataset.label}: ${fmt}`;
            },
          },
        },
      },
      scales: {
        x: {
          ticks: { color: "#aaa", font: { size: 9 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 8 },
          grid: { color: "#f5f5f5" },
        },
        y: {
          ticks: { color: "#aaa", font: { size: 9 }, callback: yTickFmt || (v => v) },
          grid: { color: "#f5f5f5" },
          beginAtZero: true,
        },
      },
    },
  });
}

function makeLineChart(canvasId, labels, datasets, yTickFmt) {
  const ctx = document.getElementById(canvasId);
  if (!ctx) return null;
  return new Chart(ctx, {
    type: "line",
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: datasets.length > 1, labels: { boxWidth: 10, font: { size: 10 }, padding: 6 } },
        tooltip: { mode: "index", intersect: false },
      },
      scales: {
        x: {
          ticks: { color: "#aaa", font: { size: 9 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 8 },
          grid: { color: "#f5f5f5" },
        },
        y: {
          ticks: { color: "#aaa", font: { size: 9 }, callback: yTickFmt || (v => v) },
          grid: { color: "#f5f5f5" },
          beginAtZero: true,
        },
      },
    },
  });
}

function renderTrends(feat) {
  const p       = getEffectiveProps(feat);
  const eiaId   = p.ID || null;
  const opId    = p.phmsa_OPERATOR_ID;
  const stop    = p.phmsa_STOP;
  const phmsaKey = (opId != null && stop) ? `${opId}_${stop}` : null;
  const name    = p.Name || p.geo_NAME || p.phmsa_OPERATOR_NAME || "Unknown";

  document.getElementById("trends-title-name").textContent = name;
  destroyTrendCharts();

  const state   = stop || p.EIA_state || null;
  const d = assembleTrendsData(eiaId, phmsaKey, state);

  const hasDcd      = d.dcdPre70.some(v => v != null && v > 0) || d.dcd7090.some(v => v != null && v > 0)
                   || d.dcd0010.some(v => v != null && v > 0)  || d.dcd20s.some(v => v != null && v > 0);
  const hasPriceBkdn = d.supplyPr.some(v => v != null) && d.nomPrice.some(v => v != null);
  const hasMatMiles  = d.matPlastic.some(v => v != null);
  const hasSrvDcd    = d.srvDcdPre70.some(v => v != null && v > 0) || d.srvDcd7090.some(v => v != null && v > 0)
                    || d.srvDcd0010.some(v => v != null && v > 0)  || d.srvDcd20s.some(v => v != null && v > 0);
  const hasSrvMat    = d.srvPlastic.some(v => v != null);

  // Determine which PHMSA years were multistate combined filings
  const multistateEntries = [];
  if (opId != null && stop) {
    for (const yr of d.years) {
      const group = getMultiStateGroup(opId, stop, yr);
      if (group) multistateEntries.push({ yr, states: group.join(", ") });
    }
  }
  // Collapse consecutive years with the same states into ranges for display
  const multistateRanges = [];
  for (const e of multistateEntries) {
    const last = multistateRanges[multistateRanges.length - 1];
    if (last && last.states === e.states && String(Number(last.endYr) + 1) === String(e.yr)) {
      last.endYr = e.yr;
    } else {
      multistateRanges.push({ startYr: e.yr, endYr: e.yr, states: e.states });
    }
  }
  const multistateNoteHtml = multistateRanges.length
    ? `<div class="multi-state-note" style="margin:10px 4px 4px;padding:7px 10px;background:#fff8e1;border-left:3px solid #e6a817;border-radius:3px;font-size:10.5px;color:#6b4c00;">
        <strong>Multistate filing years (PHMSA data):</strong>
        ${multistateRanges.map(r =>
          `${r.startYr === r.endYr ? r.startYr : r.startYr + "–" + r.endYr} <span style="color:#888">(${r.states})</span>`
        ).join(", ")}
        — data for these years may reflect combined operations across states.
      </div>`
    : "";

  const milesTickFmt = v => v != null ? (v >= 1e3 ? (v / 1e3).toFixed(0) + "K" : v.toFixed(0)) : "";
  const priceTickFmt = v => v != null ? "$" + v.toFixed(2) : "";

  document.getElementById("trends-body").innerHTML = `
    <div class="chart-block">
      <div class="chart-title">Residential Price &amp; Consumption</div>
      <div class="chart-wrap"><canvas id="tc-price-consump"></canvas></div>
    </div>
    ${hasPriceBkdn ? `<div class="chart-block">
      <div class="chart-title">Price Breakdown: Supply vs. Delivery ($/Mcf)</div>
      <div class="chart-wrap"><canvas id="tc-pricebkdn"></canvas></div>
    </div>` : ""}
    ${hasDcd ? `<div class="chart-block">
      <div class="chart-title">Pipeline Miles by Installation Era</div>
      <div class="chart-wrap" style="height:290px"><canvas id="tc-dcd"></canvas></div>
    </div>` : ""}
    ${hasMatMiles ? `<div class="chart-block">
      <div class="chart-title">Pipeline Miles by Material</div>
      <div class="chart-wrap" style="height:290px"><canvas id="tc-mat"></canvas></div>
    </div>` : ""}
    ${hasSrvDcd ? `<div class="chart-block">
      <div class="chart-title">Number of Services by Installation Era</div>
      <div class="chart-wrap" style="height:290px"><canvas id="tc-srvdcd"></canvas></div>
    </div>` : ""}
    ${hasSrvMat ? `<div class="chart-block">
      <div class="chart-title">Number of Services by Material</div>
      <div class="chart-wrap" style="height:290px"><canvas id="tc-srvmat"></canvas></div>
    </div>` : ""}
    ${multistateNoteHtml}
  `;

  const BASE  = { fill: false, tension: 0.3, borderWidth: 2, pointRadius: 2, pointHoverRadius: 4, spanGaps: true };
  const SBASE = { tension: 0.3, borderWidth: 1, pointRadius: 1, pointHoverRadius: 3, spanGaps: false };

  (function() {
    const ctx = document.getElementById("tc-price-consump");
    if (!ctx) return;
    trendCharts.priceConsump = new Chart(ctx, {
      type: "line",
      data: {
        labels: d.years,
        datasets: [
          { ...BASE, label: "Real Price (2024 $/Mcf)", data: d.realPrice, borderColor: "#1a3a5c", yAxisID: "y"  },
          { ...BASE, label: "Per Customer (Mcf)",       data: d.perCust,  borderColor: "#d4890a", yAxisID: "y2", borderDash: [4, 3] },
        ],
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: true, labels: { boxWidth: 10, font: { size: 10 }, padding: 6 } },
          tooltip: { mode: "index", intersect: false },
        },
        scales: {
          x: {
            ticks: { color: "#aaa", font: { size: 9 }, maxRotation: 0, autoSkip: true, maxTicksLimit: 8 },
            grid: { color: "#f5f5f5" },
          },
          y: {
            position: "left",
            ticks: { color: "#1a3a5c", font: { size: 9 }, callback: v => v != null ? "$" + v.toFixed(2) : "" },
            grid: { color: "#f5f5f5" },
            beginAtZero: true,
          },
          y2: {
            position: "right",
            ticks: { color: "#d4890a", font: { size: 9 }, callback: v => v != null ? v.toFixed(1) : "" },
            grid: { drawOnChartArea: false },
            beginAtZero: true,
          },
        },
      },
    });
  })();

  if (hasPriceBkdn) {
    const delivery = d.nomPrice.map((v, i) => {
      if (v == null || d.supplyPr[i] == null) return null;
      const del = v - d.supplyPr[i];
      return del >= 0 ? del : null;
    });
    trendCharts.pricebkdn = makeLineChart("tc-pricebkdn", d.years, [
      { ...BASE, label: "Supply (citygate)", data: d.supplyPr, borderColor: "#5b4fcd" },
      { ...BASE, label: "Delivery",          data: delivery,   borderColor: "#e07020", borderDash: [4, 3] },
    ], priceTickFmt);
  }

  if (hasDcd) {
    // Pre-compute cumulative sums so fill:'-1' fills between consecutive lines (not back to 0)
    const add = (a, b) => a.map((v, i) => v != null && b[i] != null ? v + b[i] : null);
    const cum1 = d.dcdPre70;
    const cum2 = add(cum1, d.dcd7090);
    const cum3 = add(cum2, d.dcd0010);
    const cum4 = add(cum3, d.dcd20s);
    const cum5 = add(cum4, d.dcdUnknown);
    trendCharts.dcd = makeStackedAreaChart("tc-dcd", d.years, [
      { ...SBASE, fill: "origin", label: "Pre-1970",    data: cum1, borderColor: "#8b2500", backgroundColor: "rgba(139,37,0,0.65)"   },
      { ...SBASE, fill: "-1",     label: "1970s–1990s", data: cum2, borderColor: "#b87a00", backgroundColor: "rgba(184,122,0,0.60)"  },
      { ...SBASE, fill: "-1",     label: "2000s–2010s", data: cum3, borderColor: "#1b8872", backgroundColor: "rgba(27,136,114,0.55)" },
      { ...SBASE, fill: "-1",     label: "2020s+",      data: cum4, borderColor: "#2a78d6", backgroundColor: "rgba(42,120,214,0.50)" },
      { ...SBASE, fill: "-1",     label: "Unknown era", data: cum5, borderColor: "#aaa",    backgroundColor: "rgba(170,170,170,0.45)" },
    ], milesTickFmt);
  }

  const srvTickFmt = v => v != null ? (v >= 1e6 ? (v / 1e6).toFixed(1) + "M" : v >= 1e3 ? (v / 1e3).toFixed(0) + "K" : v.toFixed(0)) : "";

  // Shared stacked-area helper for material charts (7 bands, same stack pattern)
  function makeMaterialChart(canvasId, data7, labels7, colors7, tickFmt) {
    const add = (a, b) => a.map((v, i) => v != null && b[i] != null ? v + b[i] : null);
    const [plastic, stCp, stUnp, ci, di, cu, other] = data7;
    const c1 = plastic;
    const c2 = add(c1, stCp);
    const c3 = add(c2, stUnp);
    const c4 = add(c3, ci);
    const c5 = add(c4, di);
    const c6 = add(c5, cu);
    const c7 = add(c6, other);
    return makeStackedAreaChart(canvasId, d.years, [
      { ...SBASE, fill: "origin", label: labels7[0], data: c1, borderColor: colors7[0][0], backgroundColor: colors7[0][1] },
      { ...SBASE, fill: "-1",     label: labels7[1], data: c2, borderColor: colors7[1][0], backgroundColor: colors7[1][1] },
      { ...SBASE, fill: "-1",     label: labels7[2], data: c3, borderColor: colors7[2][0], backgroundColor: colors7[2][1] },
      { ...SBASE, fill: "-1",     label: labels7[3], data: c4, borderColor: colors7[3][0], backgroundColor: colors7[3][1] },
      { ...SBASE, fill: "-1",     label: labels7[4], data: c5, borderColor: colors7[4][0], backgroundColor: colors7[4][1] },
      { ...SBASE, fill: "-1",     label: labels7[5], data: c6, borderColor: colors7[5][0], backgroundColor: colors7[5][1] },
      { ...SBASE, fill: "-1",     label: labels7[6], data: c7, borderColor: colors7[6][0], backgroundColor: colors7[6][1] },
    ], tickFmt);
  }

  // Bottom = oldest/most phased-out; top = modern/growing; Other always on top
  const MAT_LABELS = ["Cast Iron", "Steel (unprotected)", "Ductile Iron", "Copper", "Steel (protected)", "Plastic", "Other"];
  const MAT_COLORS = [
    ["#8b2500", "rgba(139,37,0,0.65)"],   // Cast Iron
    ["#e67e22", "rgba(230,126,34,0.58)"], // Steel (unprotected)
    ["#c0392b", "rgba(192,57,43,0.55)"],  // Ductile Iron
    ["#d4ac0d", "rgba(212,172,13,0.55)"], // Copper
    ["#2471a3", "rgba(36,113,163,0.58)"], // Steel (protected)
    ["#27ae60", "rgba(39,174,96,0.60)"],  // Plastic
    ["#aaa",    "rgba(170,170,170,0.45)"],// Other
  ];

  if (hasMatMiles) {
    trendCharts.mat = makeMaterialChart("tc-mat",
      [d.matCI, d.matStUnp, d.matDI, d.matCu, d.matStCp, d.matPlastic, d.matOther],
      MAT_LABELS, MAT_COLORS, milesTickFmt);
  }

  if (hasSrvDcd) {
    const add = (a, b) => a.map((v, i) => v != null && b[i] != null ? v + b[i] : null);
    const sc1 = d.srvDcdPre70;
    const sc2 = add(sc1, d.srvDcd7090);
    const sc3 = add(sc2, d.srvDcd0010);
    const sc4 = add(sc3, d.srvDcd20s);
    const sc5 = add(sc4, d.srvDcdUnk);
    trendCharts.srvdcd = makeStackedAreaChart("tc-srvdcd", d.years, [
      { ...SBASE, fill: "origin", label: "Pre-1970",    data: sc1, borderColor: "#8b2500", backgroundColor: "rgba(139,37,0,0.65)"   },
      { ...SBASE, fill: "-1",     label: "1970s–1990s", data: sc2, borderColor: "#b87a00", backgroundColor: "rgba(184,122,0,0.60)"  },
      { ...SBASE, fill: "-1",     label: "2000s–2010s", data: sc3, borderColor: "#1b8872", backgroundColor: "rgba(27,136,114,0.55)" },
      { ...SBASE, fill: "-1",     label: "2020s+",      data: sc4, borderColor: "#2a78d6", backgroundColor: "rgba(42,120,214,0.50)" },
      { ...SBASE, fill: "-1",     label: "Unknown era", data: sc5, borderColor: "#aaa",    backgroundColor: "rgba(170,170,170,0.45)" },
    ], srvTickFmt);
  }

  if (hasSrvMat) {
    trendCharts.srvmat = makeMaterialChart("tc-srvmat",
      [d.srvCI, d.srvStUnp, d.srvDI, d.srvCu, d.srvStCp, d.srvPlastic, d.srvOther],
      MAT_LABELS, MAT_COLORS, srvTickFmt);
  }
}

function escHtml(s) {
  if (!s) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
